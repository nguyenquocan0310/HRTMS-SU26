<text x="297.5" y="272" text-anchor="middle" font-family="DejaVu Serif" font-weight="bold" font-size="27" fill="#1A160D" letter-spacing="1">CERTIFICATE OF</text>
<text x="297.5" y="301" text-anchor="middle" font-family="DejaVu Serif Condensed" font-weight="bold" font-size="22" fill="#4B4636" letter-spacing="2">PROFESSIONAL JOCKEY LICENCE</text>
<text x="297.5" y="338" text-anchor="middle" font-family="DejaVu Serif" font-style="italic" font-size="13" fill="#726A55">This is to certify that</text>
<text x="297.5" y="378" text-anchor="middle" font-family="DejaVu Serif" font-weight="bold" font-size="28" fill="#1A160D">Nguyễn Quốc Hưng</text>
<line x1="162.5" y1="388" x2="432.5" y2="390" stroke="#BFB7A2" stroke-width="1"/>
<text x="297.5" y="416" text-anchor="middle" font-family="DejaVu Serif" font-size="12.5" fill="#1A160D">has fulfilled the professional, medical, and technical requirements</text>
<text x="297.5" y="435" text-anchor="middle" font-family="DejaVu Serif" font-size="12.5" fill="#1A160D">established by the Asian Racing &amp; Jockey Council, and is hereby granted</text>
<text x="297.5" y="454" text-anchor="middle" font-family="DejaVu Serif" font-size="12.5" fill="#1A160D">the status of a Licensed Professional Jockey, authorised to compete in</text>
<text x="297.5" y="473" text-anchor="middle" font-family="DejaVu Serif" font-size="12.5" fill="#1A160D">sanctioned Thoroughbred flat-racing events under the Council's jurisdiction.</text>
